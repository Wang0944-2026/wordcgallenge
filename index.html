<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>上岐字音字形特訓</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          animation: {
            'fade-in': 'fadeIn 0.3s ease-out',
            'fade-in-up': 'fadeInUp 0.3s ease-out',
            'bounce-soft': 'bounceSoft 2s infinite',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            fadeInUp: {
              '0%': { opacity: '0', transform: 'translateY(15px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            bounceSoft: {
              '0%, 100%': { transform: 'translateY(-5%)' },
              '50%': { transform: 'translateY(0)' },
            }
          }
        }
      }
    }
  </script>

  <!-- 自訂輔助 CSS -->
  <style>
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 1.5rem); }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    * { -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Nunito', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  </style>

  <!-- React & ReactDOM (UMD) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel Standalone (瀏覽器端編譯 JSX) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-sky-50 overflow-hidden m-0 p-0 text-slate-800 antialiased selection:bg-indigo-100 selection:text-indigo-900">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;
    
    const IconWrapper = ({ size = 24, className = "", children, ...props }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>
        {children}
      </svg>
    );

    const Clock = (p) => <IconWrapper {...p}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></IconWrapper>;
    const Play = (p) => <IconWrapper {...p}><polygon points="5 3 19 12 5 21 5 3"/></IconWrapper>;
    const CheckCircle = (p) => <IconWrapper {...p}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></IconWrapper>;
    const XCircle = (p) => <IconWrapper {...p}><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></IconWrapper>;
    const RefreshCw = (p) => <IconWrapper {...p}><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></IconWrapper>;
    const RotateCcw = (p) => <IconWrapper {...p}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></IconWrapper>;
    const Home = (p) => <IconWrapper {...p}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></IconWrapper>;
    const CloudDownload = (p) => <IconWrapper {...p}><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/><path d="M12 12v9"/><path d="m8 17 4 4 4-4"/></IconWrapper>;
    const Timer = (p) => <IconWrapper {...p}><line x1="10" y1="2" x2="14" y2="2"/><line x1="12" y1="14" x2="15" y2="11"/><circle cx="12" cy="14" r="8"/></IconWrapper>;
    const BookOpen = (p) => <IconWrapper {...p}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></IconWrapper>;
    const LayoutDashboard = (p) => <IconWrapper {...p}><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></IconWrapper>;
    const Settings = (p) => <IconWrapper {...p}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></IconWrapper>;
    const PenTool = (p) => <IconWrapper {...p}><path d="m12 19 7-7 3 3-7 7-3-3z"/><path d="m18 13-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="m2 2 7.586 7.586"/><circle cx="11" cy="11" r="2"/></IconWrapper>;
    const Award = (p) => <IconWrapper {...p}><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></IconWrapper>;
    const Link = (p) => <IconWrapper {...p}><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></IconWrapper>;
    const Library = (p) => <IconWrapper {...p}><path d="m16 6 4 14"/><path d="M12 6v14"/><path d="M8 8v12"/><path d="M4 4v16"/></IconWrapper>;
    const Archive = (p) => <IconWrapper {...p}><rect width="20" height="5" x="2" y="4" rx="2"/><path d="M4 9v9a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9"/><path d="M10 13h4"/></IconWrapper>;
    const AlertTriangle = (p) => <IconWrapper {...p}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></IconWrapper>;
    const Trophy = (p) => <IconWrapper {...p}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></IconWrapper>;

    const MOCK_QUESTIONS = [
      { id: 1, scope: '第一課', type: '字音', question: '「豌」豆苗', answer: 'ㄨㄢ', wrongOptions: ['ㄨㄢˇ', 'ㄨㄢˋ', 'ㄨㄤ'], isCloudReported: false },
      { id: 2, scope: '第一課', type: '字音', question: '「瞭」望臺', answer: 'ㄌㄧㄠˇ', wrongOptions: ['ㄌㄧㄠˋ', 'ㄌㄧㄠ', 'ㄌㄧㄠˊ'], isCloudReported: false },
      { id: 3, scope: '第二課', type: '字形', question: '打擂「ㄊㄞˊ」', answer: '臺', wrongOptions: ['台', '擡', '苔'], isCloudReported: true },
    ];

    const GOOGLE_SCRIPT_API_URL = "https://script.google.com/macros/s/AKfycbxDdp-HTmjumR_kzqJZlAf9LvV5OGiTPj9NaIw1YAv9c9SJVzQKEGUG0V8rhr2-aP98/exec"; 

    const getTypeColor = (type) => {
      const t = String(type || '').trim();
      if (t === '字音') return 'text-[#475b7a] bg-[#718ebf]/15 border border-[#718ebf]/40 shadow-sm';
      if (t === '字形') return 'text-[#9c5959] bg-[#d28b8b]/15 border border-[#d28b8b]/40 shadow-sm';
      return 'text-[#6e588c] bg-[#9f86c0]/15 border border-[#9f86c0]/40 shadow-sm';
    };

    const getDeviceName = () => {
      const ua = navigator.userAgent;
      let browser = "未知瀏覽器";
      if (ua.includes("Firefox")) browser = "Firefox";
      else if (ua.includes("Edg")) browser = "Edge";
      else if (ua.includes("Chrome")) browser = "Chrome";
      else if (ua.includes("Safari") && !ua.includes("Chrome")) browser = "Safari";

      let os = "未知系統";
      let device = "未知設備";

      if (/Windows NT 10.0/.test(ua)) { os = "Windows 10/11"; device = "PC電腦"; }
      else if (/Windows NT/.test(ua)) { os = "Windows"; device = "PC電腦"; }
      else if (/Mac OS X/.test(ua)) {
        os = "macOS " + (ua.match(/Mac OS X (\d+[._]\d+[._]?\d*)/)?.[1] || "").replace(/_/g, '.');
        device = "Mac電腦";
        if (navigator.maxTouchPoints > 1 && navigator.platform === 'MacIntel') {
            device = "iPad";
            os = "iPadOS";
        }
      }
      else if (/Android/.test(ua)) {
        os = "Android " + (ua.match(/Android (\d+(\.\d+)*)/)?.[1] || "");
        device = "Android裝置";
      }
      else if (/iPhone|iPad|iPod/.test(ua)) {
        device = ua.match(/iPhone|iPad|iPod/)[0];
        os = "iOS " + (ua.match(/OS (\d+[._]\d+[._]?\d*)/)?.[1] || "").replace(/_/g, '.');
      }
      return `${device} (${os}) - ${browser}`;
    };

    const getNowString = () => {
        const now = new Date();
        return `${now.getFullYear()}/${String(now.getMonth() + 1).padStart(2, '0')}/${String(now.getDate()).padStart(2, '0')} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
    }

    function App() {
      const [gameState, setGameState] = useState('menu'); 
      const [questionBank, setQuestionBank] = useState([]);
      const [leaderboardData, setLeaderboardData] = useState([]);
      
      const [isDbLoading, setIsDbLoading] = useState(false);
      const [isBackgroundSyncing, setIsBackgroundSyncing] = useState(false);
      const [dbStatus, setDbStatus] = useState({ type: 'info', msg: '系統準備中' });

      const dataHashRef = useRef('');

      const [apiUrl, setApiUrl] = useState(() => localStorage.getItem('CUSTOM_API_URL') || GOOGLE_SCRIPT_API_URL);
      const [showApiModal, setShowApiModal] = useState(false);
      const [inputApiUrl, setInputApiUrl] = useState('');

      const [settings, setSettings] = useState({ mode: '', scope: [], type: 'all' });
      const [questions, setQuestions] = useState([]);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [timeLeft, setTimeLeft] = useState(600); 
      const [timeSpent, setTimeSpent] = useState(0); 
      const [score, setScore] = useState({ correct: 0, incorrect: 0, wrongList: [], synced: false });
      
      const [currentOptions, setCurrentOptions] = useState([]); 
      const [isSidebarCollapsed, setIsSidebarCollapsed] = useState(false); 
      const [isEarlyEnd, setIsEarlyEnd] = useState(false); 

      const [selectedOption, setSelectedOption] = useState(null);
      const [feedback, setFeedback] = useState(null);

      const [localMistakes, setLocalMistakes] = useState(() => JSON.parse(localStorage.getItem('MISTAKES_DB')) || {});
      const [reportedList, setReportedList] = useState(() => JSON.parse(localStorage.getItem('REPORTED_DB')) || []);
      
      const [studyScope, setStudyScope] = useState('');
      const [studyType, setStudyType] = useState('all');

      const [lbFilter, setLbFilter] = useState({ type: 'all', mode: 'all', scope: 'all' });

      const [showTimeModal, setShowTimeModal] = useState(false);
      const [showNormalModal, setShowNormalModal] = useState(false);
      const [customTime, setCustomTime] = useState(5); 
      const [mistakeFilterScope, setMistakeFilterScope] = useState('all');
      const [mistakeFilterType, setMistakeFilterType] = useState('all');

      const [userName, setUserName] = useState(() => localStorage.getItem('USER_NAME') || '');
      const [showNameModal, setShowNameModal] = useState(false);
      const [confirmModal, setConfirmModal] = useState({ isOpen: false, type: '', data: null });
      const [studyReportModal, setStudyReportModal] = useState({ isOpen: false, data: null, name: userName, content: '' });
      const [alertMsg, setAlertMsg] = useState('');

      const containerRef = useRef(null);
      const textRef = useRef(null);

      useEffect(() => {
        if (gameState === 'result' && !score.synced) {
          
          if (score.wrongList.length > 0) {
            setLocalMistakes(prev => {
              const newMistakes = { ...prev };
              score.wrongList.forEach(q => {
                const key = q.question; 
                if (newMistakes[key]) {
                  newMistakes[key].count += 1;
                } else {
                  newMistakes[key] = { ...q, count: 1 };
                }
              });
              localStorage.setItem('MISTAKES_DB', JSON.stringify(newMistakes));
              return newMistakes;
            });

            const uploadMistakes = score.wrongList.map(q => ({
              scope: q.scope,
              type: q.type,
              question: q.question,
              answer: q.answer
            }));

            const cleanApiUrl = (apiUrl || '').trim();
            if (cleanApiUrl) {
              fetch(cleanApiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ action: 'logMistakes', userName: userName, deviceName: getDeviceName(), mistakes: uploadMistakes, recordTime: getNowString() })
              }).catch(e => console.warn('雲端錯題同步失敗', e));
            }
          }

          const accuracyVal = (score.correct + score.incorrect) === 0 ? 0 : Math.round((score.correct / (score.correct + score.incorrect)) * 100);
          const leaderboardPayload = {
            action: 'saveLeaderboard',
            isEndedEarly: isEarlyEnd ? '是' : '否',
            recordTime: getNowString(),
            userName: userName || '未具名',
            mode: settings.mode === 'timeChallenge' ? '計時挑戰' : settings.mode === 'normalTest' ? '一般測驗' : '錯題加強',
            type: settings.type === 'all' ? '字音+字形' : settings.type,
            scope: settings.scope.length > 0 ? settings.scope.join(', ') : '全部範圍',
            totalQuestions: score.correct + score.incorrect,
            correctCount: score.correct,
            timeSpent: formatTime(timeSpent),
            accuracy: accuracyVal + '%',
            deviceName: getDeviceName()
          };

          const cleanApiUrl = (apiUrl || '').trim();
          if (cleanApiUrl) {
            fetch(cleanApiUrl, {
              method: 'POST',
              headers: { 'Content-Type': 'text/plain;charset=utf-8' },
              body: JSON.stringify(leaderboardPayload)
            }).catch(e => console.warn('排行榜同步失敗', e));
          }

          setScore(prev => ({ ...prev, synced: true }));
        }
      }, [gameState, score.synced, score.wrongList, apiUrl, userName, isEarlyEnd, settings, score.correct, score.incorrect, timeSpent]);

      const fetchQuestions = useCallback(async (isBackground = false) => {
        if (!isBackground) {
          setIsDbLoading(true);
          setDbStatus({ type: 'info', msg: '同步雲端 API 資料中...' });
        }
        
        try {
          const cleanApiUrl = (apiUrl || '').trim();
          if (!cleanApiUrl) throw new Error("無網址");
          
          const fetchUrl = cleanApiUrl.includes('?') ? `${cleanApiUrl}&t=${Date.now()}` : `${cleanApiUrl}?t=${Date.now()}`;
          const response = await fetch(fetchUrl);
          
          if (!response.ok) throw new Error(`請求失敗，狀態碼：${response.status}`);
          
          const textData = await response.text();
          let jsonData;
          try {
            jsonData = JSON.parse(textData);
          } catch (parseError) {
            console.error("API 格式錯誤，回傳內容為：", textData.substring(0, 150));
            throw new Error("資料格式錯誤 (非 JSON)");
          }
          
          const newParsedQuestions = [];
          const cloudMistakes = {};
          const cloudReportedSet = new Set();
          const scopeCounters = {}; 
          const parsedLeaderboard = []; 

          jsonData.forEach((q) => {
            if (q.sheet === '排行榜') {
              parsedLeaderboard.push(q);
            } else if (q['有問題的題目']) {
              cloudReportedSet.add(String(q['有問題的題目']).trim());
            }
          });

          jsonData.forEach((q) => {
            if (q.sheet === '排行榜') return; 

            if (q['紀錄時間'] !== undefined || String(q.scope || '').trim() === '錯題集' || String(q.scope || '').trim() === '題目錯誤回報') {
              if (!q['有問題的題目']) {
                const mQuestion = String(q.question || q['錯題內容'] || '').trim();
                const mAnswer = String(q.answer || q['正確答案'] || '').trim();
                const mScope = String(q['年度範圍'] || q.year || q.scope || '未分類').trim();
                const mType = String(q.type || q['題型'] || '未分類').trim();

                if (mQuestion && mAnswer) {
                  if (cloudMistakes[mQuestion]) {
                    cloudMistakes[mQuestion].count += 1;
                  } else {
                    cloudMistakes[mQuestion] = { scope: mScope, type: mType, question: mQuestion, answer: mAnswer, count: 1 };
                  }
                }
              }
            } 
            else {
              const qQuestion = String(q.question || '').trim();
              const qAnswer = String(q.answer || '').trim();
              
              if (qQuestion && qAnswer) {
                const qScope = String(q.scope || '未分類').trim();

                if (!scopeCounters[qScope]) scopeCounters[qScope] = 0;
                scopeCounters[qScope]++;

                const strictId = String(q['題號'] || q['C'] || q.id || q.questionNumber || '').trim();
                const finalId = strictId || String(scopeCounters[qScope]);
                
                const isRowReportedLocal = Object.entries(q).some(([key, val]) => 
                  String(key).toLowerCase().includes('mistake') || 
                  String(val || '').toLowerCase().includes('mistake')
                );

                newParsedQuestions.push({
                  id: finalId, 
                  scope: qScope, 
                  type: String(q.type || '未分類').trim(), 
                  answer: qAnswer, 
                  question: qQuestion,
                  wrongOptions: [q.wrong1, q.wrong2, q.wrong3].filter(Boolean),
                  isCloudReported: isRowReportedLocal || cloudReportedSet.has(qQuestion)
                });
              }
            }
          });
          
          setLeaderboardData(parsedLeaderboard);

          if (newParsedQuestions.length > 0) {
            const cloudReportedQs = newParsedQuestions.filter(q => q.isCloudReported).map(q => q.question);
            
            const newDataHash = JSON.stringify({ 
                questions: newParsedQuestions, 
                mistakes: cloudMistakes,
                reports: cloudReportedQs,
                leaderboard: parsedLeaderboard 
            });

            if (dataHashRef.current !== newDataHash) {
                dataHashRef.current = newDataHash;

                if (isBackground) {
                    setIsBackgroundSyncing(true);
                    setTimeout(() => setIsBackgroundSyncing(false), 2000);
                }

                setQuestionBank(newParsedQuestions);
                if (!isBackground) setDbStatus({ type: 'success', msg: `已載入 ${newParsedQuestions.length} 題` });

                setLocalMistakes(cloudMistakes);
                localStorage.setItem('MISTAKES_DB', JSON.stringify(cloudMistakes));

                setReportedList(cloudReportedQs);
                localStorage.setItem('REPORTED_DB', JSON.stringify(cloudReportedQs));

                setStudyScope(prev => {
                  const scopes = [...new Set(newParsedQuestions.map(q => q.scope))];
                  if (!prev && scopes.length > 0) return scopes[0];
                  return prev;
                });
            }
          } else {
            throw new Error("無資料");
          }
        } catch (error) {
          setQuestionBank(prev => prev.length > 0 ? prev : MOCK_QUESTIONS);
          if (!isBackground) setDbStatus({ type: 'warning', msg: '題庫同步異常' });
        } finally {
          if (!isBackground) setIsDbLoading(false);
        }
      }, [apiUrl]);

      useEffect(() => {
        fetchQuestions(false);
        const intervalId = setInterval(() => {
          fetchQuestions(true);
        }, 10000);
        return () => clearInterval(intervalId);
      }, [fetchQuestions]);

      const shuffleArray = (array) => [...array].sort(() => Math.random() - 0.5);

      const startGame = () => {
        if (!settings.mode) {
          setAlertMsg("請先選擇一種測驗模式！");
          return;
        }

        let filtered = [];
        if (settings.mode === 'mistakePractice') {
          filtered = Object.values(localMistakes).filter(q => !reportedList.includes(q.question));
          if (settings.type !== 'all') filtered = filtered.filter(q => q.type === settings.type);
        } else {
          filtered = questionBank.filter(q => !reportedList.includes(q.question)); 
          filtered = filtered.filter(q => settings.scope.includes(q.scope));
          if (settings.type !== 'all') {
            filtered = filtered.filter(q => q.type === settings.type);
          }
          if (settings.mode === 'normalTest') {
            const ziyin = shuffleArray(filtered.filter(q => q.type === '字音')).slice(0, 100);
            const zixing = shuffleArray(filtered.filter(q => q.type === '字形')).slice(0, 100);
            filtered = [...ziyin, ...zixing];
          }
        }
        
        if (filtered.length === 0) {
          setAlertMsg("此設定組合下沒有題目，或題目皆已被回報為有問題！");
          return;
        }
        
        setQuestions(shuffleArray(filtered));
        setCurrentIndex(0);
        setScore({ correct: 0, incorrect: 0, wrongList: [], synced: false });
        setIsEarlyEnd(false);
        
        if (settings.mode === 'timeChallenge') setTimeLeft(customTime * 60);
        else if (settings.mode === 'normalTest') setTimeLeft(600);
        else setTimeLeft(0); 
        
        setTimeSpent(0);
        setGameState('playing');
        setIsSidebarCollapsed(true); 
      };

      const executeReportError = () => {
         const currentQ = confirmModal.data;
         
         const newReported = [...new Set([...reportedList, currentQ.question])];
         setReportedList(newReported);

         const currentQ = studyReportModal.data;
         localStorage.setItem('USER_NAME', studyReportModal.name.trim());
         setUserName(studyReportModal.name.trim());

         const newReported = [...new Set([...reportedList, currentQ.question])];
         setReportedList(newReported);

         const cleanApiUrl = (apiUrl || '').trim();
         if (cleanApiUrl) {
           fetch(cleanApiUrl, {
              method: 'POST',
              headers: { 'Content-Type': 'text/plain;charset=utf-8' },

                  action: 'reportError',

      };

      useEffect(() => {
        if (gameState === 'playing' && questions[currentIndex]) {
          const currentQ = questions[currentIndex];
          let distractors = [];

          if (currentQ.wrongOptions && currentQ.wrongOptions.length > 0) {
            distractors = [...currentQ.wrongOptions];
          }
          
          if (distractors.length < 3) {
            const sameTypeAnswers = Array.from(new Set(
              questionBank
                .filter(q => q.type === currentQ.type && q.answer !== currentQ.answer && !distractors.includes(q.answer))
                .map(q => q.answer)
            ));
            const shuffledAnswers = sameTypeAnswers.sort(() => 0.5 - Math.random());
            let addIdx = 0;
            while (distractors.length < 3 && addIdx < shuffledAnswers.length) {
              distractors.push(shuffledAnswers[addIdx]);
              addIdx++;
            }
          }
          
          const fallbackZhuyin = ['ㄓ', 'ㄔ', 'ㄕ', 'ㄖ', 'ㄗ', 'ㄘ', 'ㄙ', 'ㄧ', 'ㄨ', 'ㄩ'];
          const fallbackWords = ['甲', '乙', '丙', '丁', '戊', '己', '庚', '辛', '壬', '癸'];
          let fallbacks = currentQ.type === '字音' ? fallbackZhuyin : fallbackWords;
          let fIdx = 0;
          
          while (distractors.length < 3 && fIdx < fallbacks.length) {
            if (!distractors.includes(fallbacks[fIdx]) && fallbacks[fIdx] !== currentQ.answer) {
              distractors.push(fallbacks[fIdx]);
            }
            fIdx++;
          }

          const combinedOptions = [currentQ.answer, ...distractors.slice(0, 3)].sort(() => 0.5 - Math.random());
          setCurrentOptions(combinedOptions);

          const textWidth = text.scrollWidth;
          if (textWidth > containerWidth && containerWidth > 0) {
            const scale = containerWidth / textWidth;
            text.style.transform = `scale(${scale})`;
          }

        return () => clearInterval(timer);

        const isCorrect = selectedAnswer === currentQ.answer;

          .filter(item => lbFilter.mode === 'all' || item.mode === lbFilter.mode)

             if (lbFilter.scope === '單一年度') return !isMulti;
             if (lbFilter.scope === '多年度') return isMulti;
             return true;
          })
          .sort((a, b) => {
             const accA = parseFloat(a.accuracy) || 0;
             const accB = parseFloat(b.accuracy) || 0;
             if (accA !== accB) return accB - accA;

             const timeToSec = (t) => {
                 if (!t) return 99999;
                 const [m, s] = t.split(':').map(Number);
                 return (m || 0) * 60 + (s || 0);
             };
             const timeA = timeToSec(a.timeSpent);
             const timeB = timeToSec(b.timeSpent);
             if (timeA !== timeB) return timeA - timeB;

             const totA = parseInt(a.totalQuestions) || 0;
             const totB = parseInt(b.totalQuestions) || 0;
             return totB - totA;

                  type="text" 
                  value={userName}
                  onChange={(e) => setUserName(e.target.value)}
                  placeholder="例如：王小明"
                  className="w-full bg-slate-50 border-4 border-slate-200 focus:border-emerald-400 outline-none rounded-2xl px-5 py-5 text-slate-800 font-black text-xl transition-colors mb-8 shadow-inner text-center"
                  autoFocus
                />
                <div className="flex gap-4">
                  <button onClick={() => setShowNameModal(false)} className="flex-1 py-4 rounded-2xl font-black text-slate-500 bg-slate-100 hover:bg-slate-200 transition-colors border-2 border-slate-200 shadow-[0_4px_0_0_#cbd5e1] active:translate-y-[4px] active:shadow-none text-lg">
                    取消
                  </button>
                  <button 
                    onClick={() => {
                      if(!userName.trim()) {
                        setAlertMsg("請輸入使用者名稱！");
                        return;
                      }
                      localStorage.setItem('USER_NAME', userName.trim());
                      setShowNameModal(false);
                      startGame();
                    }} 
                    className="flex-[2] py-4 rounded-2xl font-black text-white bg-emerald-500 hover:bg-emerald-400 transition-colors border-2 border-emerald-700 shadow-[0_4px_0_0_#047857] active:translate-y-[4px] active:shadow-none text-lg"
                  >
                    確認並開始
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* 全局提示訊息 Alert */}
          {alertMsg && (
            <div className="fixed inset-0 z-[80] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-fade-in">
              <div className="bg-white rounded-[2rem] p-8 max-w-sm w-full animate-fade-in-up text-center flex flex-col items-center border-4 border-slate-200 shadow-[0_8px_0_0_#cbd5e1]">
                <div className="w-20 h-20 bg-rose-100 text-rose-500 rounded-[1.5rem] border-2 border-rose-200 flex items-center justify-center mb-6 shadow-[0_4px_0_0_#fda4af]">
                  <XCircle size={40} />
                </div>
                <h3 className="text-3xl font-black text-slate-800 mb-3">系統提示</h3>
                <p className="text-slate-500 font-bold mb-8 leading-relaxed text-lg">{alertMsg}</p>
                <button onClick={() => setAlertMsg('')} className="w-full py-4 rounded-2xl font-black text-white text-xl bg-rose-500 hover:bg-rose-400 transition-colors border-2 border-rose-700 shadow-[0_6px_0_0_#be123c] active:translate-y-[6px] active:shadow-none">
                  我知道了
                </button>
              </div>
            </div>
          )}

          {/* 報錯 Modal */}
          {studyReportModal.isOpen && (
            <div className="fixed inset-0 z-[70] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-fade-in">
              <div className="bg-white rounded-[2rem] p-6 md:p-8 max-w-md w-full shadow-2xl animate-fade-in-up flex flex-col border-4 border-slate-200 shadow-[0_8px_0_0_#cbd5e1]">
                <h3 className="text-2xl font-black text-slate-800 mb-4 flex items-center gap-3">
                  <div className="bg-sky-100 text-sky-600 p-2.5 rounded-[1rem] border-2 border-sky-200"><AlertTriangle size={24} /></div>
                  回報題目疑慮
                </h3>
                
                <div className="bg-slate-50 border-2 border-slate-200 rounded-xl p-4 mb-5 text-center">
                  <p className="text-sm font-bold text-slate-400 mb-1">您正在回報的題目：</p>
                  <p className="text-xl font-black text-slate-700">{studyReportModal.data?.question}</p>
                </div>

                <div className="flex flex-col gap-4 mb-6">
                  <div>
                    <label className="block text-sm font-black text-slate-500 mb-2 pl-1">真實姓名</label>
                    <input 
                      type="text" 
                      value={studyReportModal.name}
                      onChange={(e) => setStudyReportModal(s => ({ ...s, name: e.target.value }))}
                      placeholder="請輸入您的姓名"
                      className="w-full bg-slate-50 border-4 border-slate-200 focus:border-sky-400 outline-none rounded-2xl px-5 py-3 text-slate-800 font-bold text-lg transition-colors shadow-inner"
                    />
                  </div>
                  <div>
                    <label className="block text-sm font-black text-slate-500 mb-2 pl-1">問題回報內容</label>
                    <textarea 
                      value={studyReportModal.content}
                      onChange={(e) => setStudyReportModal(s => ({ ...s, content: e.target.value }))}
                      placeholder="這題哪裡有錯呢？（例如：答案應該是 ㄨㄢ 不是 ㄨㄢˇ）"
                      rows="3"
                      className="w-full bg-slate-50 border-4 border-slate-200 focus:border-sky-400 outline-none rounded-2xl px-5 py-3 text-slate-800 font-bold text-base transition-colors shadow-inner resize-none"
                    ></textarea>
                  </div>
                </div>

                <div className="flex gap-4">
                  <button onClick={() => setStudyReportModal({isOpen: false, data: null, name: userName, content: ''})} className="flex-1 py-4 rounded-2xl font-black text-slate-500 bg-slate-100 hover:bg-slate-200 transition-colors border-2 border-slate-200 shadow-[0_4px_0_0_#cbd5e1] active:translate-y-[4px] active:shadow-none text-lg">取消</button>
                  <button onClick={executeStudyReport} className="flex-[2] py-4 rounded-2xl font-black text-white bg-sky-500 hover:bg-sky-400 transition-colors border-2 border-sky-700 shadow-[0_4px_0_0_#0284c7] active:translate-y-[4px] active:shadow-none text-lg">送出回報</button>
                </div>
              </div>
            </div>
          )}

          {/* 全域頁尾版權宣告 (深色高對比 + 膠囊白底) */}
          <div className="fixed bottom-[80px] md:bottom-4 right-4 md:right-6 text-[10px] md:text-xs font-black text-slate-600 bg-white/80 backdrop-blur-md px-3 py-1.5 rounded-full border-2 border-white shadow-sm pointer-events-none z-40 tracking-wider">
            大榮老師製作 © 2026 | Version 3.1 (v.3.1)
          </div>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
